  - **/.vite/**
  - **/*.tsbuildinfo
  - **/test-results/**
  - **/.playwright-artifacts-*/**
  - **/junit.xml

commands:
  - git status --short

deliverables:
  - .parallel/artifacts/AUTO-kimi-auto-code/changed-files.txt
  - .parallel/artifacts/AUTO-kimi-auto-code/commands-run.txt
  - .parallel/artifacts/AUTO-kimi-auto-code/test-report.txt
  - .parallel/artifacts/AUTO-kimi-auto-code/handoff.md
  - .parallel/artifacts/AUTO-kimi-auto-code/session-export.md

commit_message: "feat(auto-kimi): AUTO-kimi-auto-code"

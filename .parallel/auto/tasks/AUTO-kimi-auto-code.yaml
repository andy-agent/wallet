task_id: AUTO-kimi-auto-code
worker: kimi-auto-code
worker_config: .parallel/workers/kimi-auto-code.conf
ownership_file: .parallel/ownership/kimi-auto-code.conf
branch: kimi-auto/code
worktree: ../wt-kimi-auto-code
codex_branch: codex/auto-integration
codex_worktree: ../wt-codex-auto-integration
base_branch: main

goal: >
  Auto-generated lane for module code.

allow:
  - code/**
  - .parallel/artifacts/**

deny:
  - app/api/**
  - scripts/**
  - .github/**
  - .beads/**
  - CONTINUITY.md

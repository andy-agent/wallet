<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>03 Plan Guide</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body class="single-page">
    <main class="page-frame">
      <div class="page-stack" style="padding-bottom: 74px">
        <header class="status-bar">
          <span>18:07</span>
          <div class="status-icons">
            <span class="signal"><span></span><span></span><span></span></span>
            <span>◔</span>
            <span class="battery"></span>
          </div>
        </header>

        <section>
          <div class="eyebrow">VPN PLAN</div>
          <div class="title-row" style="margin-top: 10px">
            <div>
              <h1 class="page-title">选择订阅计划</h1>
              <p class="page-subtitle">
                先开通节点权益，再绑定钱包支付。年度 Pro 会降低续费频次与 Gas 干扰。
              </p>
            </div>
            <span class="badge-pill is-live">推荐方案</span>
          </div>
        </section>

        <section class="surface-card">
          <div class="section-label">
            <span>年度 Pro</span>
            <span>最优 ROI</span>
          </div>
          <div class="headline-emphasis" style="font-size: 30px; margin-top: 12px">$580</div>
          <p class="card-subtitle">5 台设备 · 高速专线 · 智能分流 · 风险白名单</p>
          <div class="chip-row" style="margin-top: 14px">
            <span class="chip is-green">年费节省 34%</span>
            <span class="chip is-blue">节点权益增益</span>
            <span class="chip is-violet">优先客服</span>
          </div>
          <div class="dual-grid" style="margin-top: 14px">
            <div class="mini-card">
              <div class="metric-label">预估 Gas</div>
              <div class="metric-value" style="font-size: 24px">1.24</div>
              <div class="metric-caption">USDT</div>
            </div>
            <div class="mini-card">
              <div class="metric-label">预计开通</div>
              <div class="metric-value" style="font-size: 24px">1</div>
              <div class="metric-caption">分钟内</div>
            </div>
          </div>
        </section>

        <section class="surface-card">
          <div class="section-label">
            <span>可选计划</span>
            <span>支持切换</span>
          </div>
          <div class="list-stack" style="margin-top: 12px">
            <div class="list-item">
              <span class="mini-icon is-blue">年</span>
              <div class="list-copy">
                <strong>Annual Pro</strong>
                <span>适合长期 VPN + 钱包组合使用。</span>
              </div>
              <span class="change up"><strong>$580</strong>最优</span>
            </div>
            <div class="list-item">
              <span class="mini-icon is-violet">月</span>
              <div class="list-copy">
                <strong>Monthly Flex</strong>
                <span>更灵活，但续费频次与成本更高。</span>
              </div>
              <span class="change soft-down"><strong>$69</strong>单月</span>
            </div>
          </div>
        </section>

        <div class="flex-spacer"></div>
        <div class="cta-dock">
          <button class="primary-button">确认计划并继续</button>
        </div>
      </div>
    </main>
  </body>
</html>

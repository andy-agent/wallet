<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>购买你的套餐</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/tokens.css">
  <link rel="stylesheet" href="../../shared/base.css">
  <link rel="stylesheet" href="../../shared/components.css">
  <link rel="stylesheet" href="../../shared/effects.css">
  <link rel="stylesheet" href="../../shared/p0-p1.css">
</head>
<body class="p01-body">
  <main class="p01-shell">
    <section class="p01-screen">
      <div class="p01-safe">
        <div class="p01-status"><span>18:08</span><div class="p01-icons"><span></span><span></span></div></div>
        <header class="p01-header">
          <div class="p01-eyebrow">SUBSCRIPTION</div>
          <div class="p01-chip-row"><span class="p01-chip">支持钱包直付</span></div>
          <h1 class="p01-title">购买你的套餐</h1>
          <p class="p01-subtitle">VPN 是核心服务，钱包是支付与资产层。这里把它们真正融合。</p>
        </header>
        <section class="p01-body-grid">
          <article class="p01-card">
            <div class="p01-card-header">
              <div class="p01-card-title">当前状态</div>
              <span class="p01-chip">还剩 2 天</span>
            </div>
            <div class="p01-metric-grid">
              <div class="p01-metric">
                <div class="p01-metric-label">当前计划</div>
                <div class="p01-metric-value">Pro 月付</div>
              </div>
              <div class="p01-metric">
                <div class="p01-metric-label">支付资产</div>
                <div class="p01-metric-value">USDT</div>
              </div>
            </div>
            <p class="p01-card-copy" style="margin-top:12px;">东京 · 新加坡专线，TRON / Solana 可选。</p>
          </article>
          <div class="p01-plan-grid">
            <article class="p01-plan-card" data-toggle-group="plan-select" role="button" tabindex="0">
              <div class="p01-card-header" style="margin-bottom:8px;">
                <div class="p01-card-title">月度</div>
                <span class="p01-chip">$8.90</span>
              </div>
              <p class="p01-card-copy">适合首次体验，按月续费。</p>
              <div class="p01-chip-row" style="margin-top:12px;">
                <span class="p01-network-chip">SOL</span>
                <span class="p01-network-chip">USDT-SOL</span>
                <span class="p01-network-chip">USDT-TRON</span>
              </div>
            </article>
            <article class="p01-plan-card featured active" data-toggle-group="plan-select" role="button" tabindex="0">
              <div class="p01-card-header" style="margin-bottom:8px;">
                <div class="p01-card-title">年度 Pro</div>
                <span class="p01-chip">最受欢迎</span>
              </div>
              <div class="p01-metric-value">$58.00</div>
              <p class="p01-card-copy">节省 46%，开放高速专线与隐私路由。</p>
              <div class="p01-chip-row" style="margin-top:12px;">
                <span class="p01-network-chip">高速专线</span>
                <span class="p01-network-chip">智能切区</span>
                <span class="p01-network-chip">钱包直付</span>
              </div>
            </article>
            <article class="p01-plan-card" data-toggle-group="plan-select" role="button" tabindex="0">
              <div class="p01-card-header" style="margin-bottom:8px;">
                <div class="p01-card-title">团队版</div>
                <span class="p01-chip">$149.00</span>
              </div>
              <p class="p01-card-copy">最多 5 台设备，适合小团队与多端钱包使用。</p>
            </article>
          </div>
          <div class="p01-actions">
            <a class="p01-button-primary" href="./order_checkout.html">使用钱包支付并开通</a>
          </div>
        </section>
        <nav class="p01-bottom-nav">
          <a class="p01-nav" href="../p0/vpn_home.html"><span class="p01-nav-icon"></span><span>总览</span></a>
          <a class="p01-nav active" href="./plans.html"><span class="p01-nav-icon"></span><span>VPN</span></a>
          <a class="p01-nav" href="../p0/wallet_home.html"><span class="p01-nav-icon"></span><span>钱包</span></a>
          <a class="p01-nav" href="../p2-core/invite_center.html"><span class="p01-nav-icon"></span><span>增长</span></a>
          <a class="p01-nav" href="../p2-core/profile.html"><span class="p01-nav-icon"></span><span>我的</span></a>
        </nav>
      </div>
    </section>
  </main>
  <script src="../../shared/page-router.js"></script>
</body>
</html>

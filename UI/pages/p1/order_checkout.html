<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>订单收银台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/tokens.css">
  <link rel="stylesheet" href="../../shared/base.css">
  <link rel="stylesheet" href="../../shared/components.css">
  <link rel="stylesheet" href="../../shared/effects.css">
  <link rel="stylesheet" href="../../shared/p0-p1.css">
</head>
<body class="p01-body">
  <main class="p01-shell">
    <section class="p01-screen">
      <div class="p01-safe">
        <div class="p01-status"><span>18:33</span><div class="p01-icons"><span></span><span></span></div></div>
        <header class="p01-header">
          <a class="p01-back" href="./plans.html">&lt;</a>
          <div class="p01-eyebrow">CHECKOUT</div>
          <div class="p01-chip-row"><span class="p01-chip">• 10分钟有效</span></div>
          <h1 class="p01-title">订单收银台</h1>
          <p class="p01-subtitle">确认套餐、支付网络与到账说明。</p>
        </header>
        <section class="p01-body-grid">
          <article class="p01-card">
            <div class="p01-card-title">订单信息</div>
            <p class="p01-card-copy">选择链上资产完成支付，系统会自动激活对应订阅。</p>
            <div class="p01-list" style="margin-top:12px;">
              <div class="p01-row"><div><div class="p01-row-title">套餐</div></div><div class="p01-row-value">年费 Pro</div></div>
              <div class="p01-row"><div><div class="p01-row-title">支付网络</div></div><div class="p01-row-value">TRON / Solana</div></div>
              <div class="p01-row"><div><div class="p01-row-title">订单金额</div></div><div class="p01-row-value">149.00 USDT</div></div>
            </div>
          </article>
          <div class="p01-chip-row">
            <span class="p01-chip">USDT-TRON</span>
            <span class="p01-chip">USDT-Solana</span>
            <span class="p01-chip">SOL</span>
          </div>
          <div class="p01-dual">
            <a class="p01-button-secondary" href="./order_list.html">扫码支付</a>
            <a class="p01-button-primary" href="./wallet_payment_confirm.html">我已完成支付</a>
          </div>
        </section>
      </div>
    </section>
  </main>
</body>
</html>

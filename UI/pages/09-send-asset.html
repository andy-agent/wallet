<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>09 Send Asset</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body class="single-page">
    <main class="page-frame">
      <div class="page-stack" style="padding-bottom: 78px">
        <header class="status-bar">
          <span>18:12</span>
          <div class="status-icons">
            <span class="signal"><span></span><span></span><span></span></span>
            <span>◔</span>
            <span class="battery"></span>
          </div>
        </header>

        <section>
          <div class="eyebrow">SEND ASSET</div>
          <div class="title-row" style="margin-top: 10px">
            <div>
              <h1 class="page-title">发送资产</h1>
              <p class="page-subtitle">
                把链、地址、Gas 与隐私网络状态放成一个确认面板里。
              </p>
            </div>
            <span class="badge-pill is-alert">风险校验中</span>
          </div>
        </section>

        <section>
          <div class="tiny-muted" style="margin-bottom: 6px">选择资产</div>
          <div class="search-bar">
            <span class="mini-icon is-green">U</span>
            <span class="grow" style="color: var(--text)">USDT</span>
            <span class="tiny-badge is-live">切换</span>
          </div>
          <div class="muted-balance">TRON 网络优先</div>
        </section>

        <section>
          <div class="tiny-muted" style="margin-bottom: 6px">收款地址</div>
          <div class="search-bar">
            <span class="mini-icon">⌁</span>
            <span class="grow">TQ2X...8Lk2 · 或扫描二维码</span>
          </div>
        </section>

        <section>
          <div class="tiny-muted" style="margin-bottom: 6px">网络地址</div>
          <div class="tabs">
            <span class="seg-pill is-active">TRON · Fee 最低</span>
            <span class="seg-pill">Solana</span>
          </div>
        </section>

        <section class="surface-card amount-panel">
          <div class="metric-label">发送数量</div>
          <div class="metric-value">580</div>
          <div class="metric-caption">≈ $580.00 USDT</div>
          <div class="dual-grid" style="margin-top: 16px">
            <div class="mini-card">
              <div class="metric-label">网络费</div>
              <div class="metric-value" style="font-size: 20px">1.24 USDT</div>
            </div>
            <div class="mini-card">
              <div class="metric-label">预计到帐</div>
              <div class="metric-value" style="font-size: 20px">~ 38 秒</div>
            </div>
          </div>
        </section>

        <section class="surface-card">
          <div class="section-label">
            <span>安全检查</span>
            <span>通过 3 / 4</span>
          </div>
          <div class="list-stack" style="margin-top: 12px">
            <div class="list-item">
              <span class="mini-icon is-green">•</span>
              <div class="list-copy">
                <strong>地址格式正确</strong>
                <span>与 TRON 主网规则完成匹配</span>
              </div>
            </div>
            <div class="list-item">
              <span class="mini-icon">•</span>
              <div class="list-copy">
                <strong>历史交互检测</strong>
                <span>历史上曾经通过此地址发生过交互</span>
              </div>
            </div>
            <div class="list-item">
              <span class="mini-icon is-green">•</span>
              <div class="list-copy">
                <strong>VPN 隐私路由可用</strong>
                <span>交易请求将通过已连接的安全通道广播</span>
              </div>
            </div>
          </div>
        </section>

        <div class="flex-spacer"></div>
        <div class="cta-dock">
          <button class="primary-button">确认并发送</button>
        </div>
      </div>
    </main>
  </body>
</html>

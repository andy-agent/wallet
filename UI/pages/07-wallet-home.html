<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>07 Wallet Home</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body class="single-page">
    <main class="page-frame">
      <div class="page-stack" style="padding-bottom: 108px">
        <header class="status-bar">
          <span>18:11</span>
          <div class="status-icons">
            <span class="signal"><span></span><span></span><span></span></span>
            <span>◔</span>
            <span class="battery"></span>
          </div>
        </header>

        <section>
          <div class="eyebrow">WALLET HOME</div>
          <div class="title-row" style="margin-top: 10px">
            <div>
              <h1 class="page-title">钱包资产</h1>
              <p class="page-subtitle">钱包余额、链上资产与快捷动作放在同一个首页。</p>
            </div>
            <span class="badge-pill is-safe">已同步</span>
          </div>
        </section>

        <section class="surface-card">
          <div class="section-label">
            <span>总资产</span>
            <span>USER</span>
          </div>
          <div class="metric-value" style="font-size: 34px; margin-top: 12px">$54,184.26</div>
          <div class="metric-caption">24h +4.24% · 由 USDT / SOL / ENJ 组成</div>
          <div class="chart-wrap" style="padding: 8px 0 0">
            <svg viewBox="0 0 320 100" role="img" aria-label="wallet trend">
              <defs>
                <linearGradient id="walletLine" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#5176ff"></stop>
                  <stop offset="100%" stop-color="#2fd1ff"></stop>
                </linearGradient>
              </defs>
              <path d="M0 76 C28 74 42 65 60 58 C82 48 104 54 124 46 C150 34 178 38 198 28 C220 18 236 16 258 22 C280 30 300 24 320 10" fill="none" stroke="url(#walletLine)" stroke-width="4" stroke-linecap="round"></path>
              <path d="M0 76 C28 74 42 65 60 58 C82 48 104 54 124 46 C150 34 178 38 198 28 C220 18 236 16 258 22 C280 30 300 24 320 10 L320 100 L0 100 Z" fill="rgba(81, 118, 255, 0.1)"></path>
            </svg>
          </div>
          <div class="button-row" style="margin-top: 4px">
            <button class="secondary-button">收款</button>
            <button class="primary-button">发送</button>
          </div>
        </section>

        <section class="surface-card">
          <div class="section-label">
            <span>资产列表</span>
            <span>按余额排序</span>
          </div>
          <div class="list-stack" style="margin-top: 10px">
            <div class="list-item">
              <span class="mini-icon is-green">U</span>
              <div class="list-copy">
                <strong>USDT</strong>
                <span>TRON · 钱包主余额</span>
              </div>
              <span class="change up"><strong>$12,781</strong>+2.1%</span>
            </div>
            <div class="list-item">
              <span class="mini-icon">S</span>
              <div class="list-copy">
                <strong>SOL</strong>
                <span>8.82 SOL · 主网</span>
              </div>
              <span class="change up"><strong>$1,602</strong>+1.4%</span>
            </div>
            <div class="list-item">
              <span class="mini-icon is-violet">E</span>
              <div class="list-copy">
                <strong>ENJ</strong>
                <span>资金异动跟踪中</span>
              </div>
              <span class="change up"><strong>$246</strong>+44.1%</span>
            </div>
          </div>
        </section>

        <nav class="bottom-nav">
          <div class="nav-item"><span class="nav-icon">◎</span><span>总览</span></div>
          <div class="nav-item"><span class="nav-icon">◌</span><span>VPN</span></div>
          <div class="nav-item is-active"><span class="nav-icon">¤</span><span>钱包</span></div>
          <div class="nav-item"><span class="nav-icon">⌁</span><span>增长</span></div>
          <div class="nav-item"><span class="nav-icon">◔</span><span>我的</span></div>
        </nav>
      </div>
    </main>
  </body>
</html>

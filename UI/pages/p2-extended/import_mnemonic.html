<body class="p2e-body">
  <main class="p2e-shell">
    <section class="p2e-phone accent-green">
      <div class="p2e-layer p2e-layer-dust"></div>
      <div class="p2e-layer p2e-layer-glow"></div>
      <svg class="p2e-mesh" viewBox="0 0 220 220" aria-hidden="true">
        <path d="M30 44L120 24 188 112 154 196 86 184 52 104z"></path>
        <path d="M120 24L82 138 154 196 188 112"></path>
        <circle cx="30" cy="44" r="3"></circle>
        <circle cx="120" cy="24" r="3"></circle>
        <circle cx="188" cy="112" r="3"></circle>
        <circle cx="154" cy="196" r="3"></circle>
        <circle cx="86" cy="184" r="3"></circle>
        <circle cx="52" cy="104" r="3"></circle>
        <circle cx="82" cy="138" r="3"></circle>
      </svg>
      <div class="p2e-safe">
        <div class="p2e-status">
          <div>19:07</div>
          <div class="p2e-icons">
            <div class="p2e-signal"><span></span><span></span><span></span><span></span></div>
            <div class="p2e-wifi"></div>
            <div class="p2e-battery"></div>
          </div>
        </div>

        <header class="p2e-hero">
          <div class="p2e-kicker">Mnemonic Import</div>
          <h1 class="p2e-title">输入助记词</h1>
          <p class="p2e-subtitle">支持12/18/24个单词，并自动识别可恢复的链。</p>
          <a class="p2e-hub" href="./backup_mnemonic.html">
            <span class="p2e-hub-label">离线解析</span>
            <span class="p2e-hub-orb"></span>
          </a>
        </header>

        <section class="p2e-card p2e-panel">
          <h2 class="p2e-panel-title">助记词恢复</h2>
          <p class="p2e-panel-copy">你的助记词仅在本地解析，不会上传真服务器。</p>
          <div class="p2e-fields">
            <label class="p2e-field-group">
              <span class="p2e-field-label">助记词</span>
              <textarea class="p2e-textarea">ocean brick velvet lamp maple vivid orbit coral charge laptop anchor glow</textarea>
            </label>
          </div>
          <div class="p2e-chip-row">
            <span class="p2e-chip is-active">自动识别链</span>
            <span class="p2e-chip">仅恢复 Solana</span>
            <span class="p2e-chip">仅恢复 TRON</span>
            <span class="p2e-chip">高级</span>
          </div>
          <div class="p2e-card p2e-detected">
            <span class="p2e-option-icon" style="background: rgba(37, 203, 136, 0.14);"></span>
            <div>
              <strong>已识别链</strong>
              <span>Solana · TRON · Base</span>
            </div>
          </div>
        </section>

        <div class="p2e-page-bottom">
          <div class="p2e-actions">
            <a class="p2e-button p2e-button-primary" href="./backup_mnemonic.html">解析并继续</a>
            <a class="p2e-button p2e-button-secondary" href="./import_wallet_method.html">返回导入方式</a>

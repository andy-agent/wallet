<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>跨链桥接</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/tokens.css">
  <link rel="stylesheet" href="../../shared/base.css">
  <link rel="stylesheet" href="../../shared/components.css">
  <link rel="stylesheet" href="../../shared/effects.css">
  <link rel="stylesheet" href="../../shared/p2-extended.css">
  <link rel="stylesheet" href="../../shared/p0-p1.css">
</head>
<body class="p01-body">
  <main class="p01-shell">
    <section class="p01-screen">
      <div class="p01-safe">
        <div class="p2e-status">
          <div>19:29</div>
          <div class="p2e-icons">
            <div class="p2e-signal"><span></span><span></span><span></span><span></span></div>
            <div class="p2e-wifi"></div>
            <div class="p2e-battery"></div>
          </div>
        </div>

        <header class="p2e-hero">
          <div class="p2e-kicker">BRIDGE</div>
          <h1 class="p2e-title">跨链桥接</h1>
          <p class="p2e-subtitle">补齐多链钱包核心能力：资产跨链迁移与到账追踪。</p>
          <a class="p2e-hub" href="./dapp_browser.html">
            <span class="p2e-hub-label">BRIDGE</span>
            <span class="p2e-hub-orb"></span>
          </a>
        </header>

        <section class="p2e-card p2e-panel">
          <h2 class="p2e-panel-title">桥接面板</h2>
          <p class="p2e-panel-copy">支持常用主流链之间的稳定币与主资产桥接。</p>
          <div class="p2e-fields">
            <label class="p2e-field-group">
              <span class="p2e-field-label">来源链</span>
              <input class="p2e-input" value="TRON">
            </label>
            <label class="p2e-field-group">
              <span class="p2e-field-label">目标链</span>
              <input class="p2e-input" value="Solana">
            </label>
            <label class="p2e-field-group">
              <span class="p2e-field-label">资产</span>
              <input class="p2e-input" value="USDT">
            </label>
            <label class="p2e-field-group">
              <span class="p2e-field-label">数量</span>
              <input class="p2e-input" value="580.00">
            </label>
          </div>
          <div class="p2e-kpi-grid">
            <div class="p2e-kpi">
              <div class="p2e-kpi-label">桥接费用</div>
              <strong>$1.9</strong>
            </div>
            <div class="p2e-kpi">
              <div class="p2e-kpi-label">预计用时</div>
              <strong>3 min</strong>
            </div>
            <div class="p2e-kpi">
              <div class="p2e-kpi-label">到账数量</div>
              <strong>578.1</strong>
            </div>
          </div>
        </section>

        <div class="p2e-page-bottom">
          <div class="p2e-actions">
            <a class="p2e-button p2e-button-primary" href="./dapp_browser.html">预览桥接并继续</a>
            <a class="p2e-button p2e-button-secondary" href="./swap.html">返回 Swap</a>
          </div>
        </div>
        <nav class="p01-bottom-nav">
          <a class="p01-nav " href="../p0/vpn_home.html"><span class="p01-nav-icon"></span><span>总览</span></a>
          <a class="p01-nav " href="../p1/plans.html"><span class="p01-nav-icon"></span><span>VPN</span></a>
          <a class="p01-nav active" href="../p0/wallet_home.html"><span class="p01-nav-icon"></span><span>钱包</span></a>
          <a class="p01-nav " href="../p2-core/invite_center.html"><span class="p01-nav-icon"></span><span>增长</span></a>
          <a class="p01-nav " href="../p2-core/profile.html"><span class="p01-nav-icon"></span><span>我的</span></a>
        </nav>
      </div>
    </section>
  </main>
  <script src="../../shared/page-router.js"></script>
</body>
</html>

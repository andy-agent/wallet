<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安全中心</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/tokens.css">
  <link rel="stylesheet" href="../../shared/base.css">
  <link rel="stylesheet" href="../../shared/components.css">
  <link rel="stylesheet" href="../../shared/effects.css">
  <link rel="stylesheet" href="../../shared/p2-extended.css">
</head>
<body class="p2e-body">
  <main class="p2e-shell">
    <section class="p2e-phone accent-green">
      <div class="p2e-layer p2e-layer-dust"></div>
      <div class="p2e-layer p2e-layer-glow"></div>
      <svg class="p2e-mesh" viewBox="0 0 220 220" aria-hidden="true">
        <path d="M48 42L132 26 190 78 176 146 122 202 54 170 36 114z"></path>
        <path d="M132 26L108 108 122 202 176 146 190 78"></path>
        <circle cx="48" cy="42" r="3"></circle>
        <circle cx="132" cy="26" r="3"></circle>
        <circle cx="190" cy="78" r="3"></circle>
        <circle cx="176" cy="146" r="3"></circle>
        <circle cx="122" cy="202" r="3"></circle>
        <circle cx="54" cy="170" r="3"></circle>
        <circle cx="36" cy="114" r="3"></circle>
        <circle cx="108" cy="108" r="3"></circle>
      </svg>
      <div class="p2e-safe">
        <div class="p2e-status">
          <div>19:16</div>
          <div class="p2e-icons">
            <div class="p2e-signal"><span></span><span></span><span></span><span></span></div>
            <div class="p2e-wifi"></div>
            <div class="p2e-battery"></div>
          </div>
        </div>

        <header class="p2e-hero">
          <div class="p2e-kicker">Security Center</div>
          <h1 class="p2e-title">安全中心</h1>
          <p class="p2e-subtitle">管理助记词、设备、签名授权与高风险地址提醒。</p>
          <a class="p2e-hub" href="./chain_manager.html">
            <span class="p2e-hub-label">A级</span>
            <span class="p2e-hub-orb"></span>
          </a>
        </header>

        <div class="p2e-kpi-grid">
          <div class="p2e-kpi">
            <div class="p2e-kpi-label">助记词状态</div>
            <strong>已备份</strong>
          </div>
          <div class="p2e-kpi">
            <div class="p2e-kpi-label">双重验证</div>
            <strong>已开启</strong>
          </div>
          <div class="p2e-kpi">
            <div class="p2e-kpi-label" style="--accent-color: #ff9848;">风险地址</div>
            <strong>2 条</strong>
          </div>
        </div>

        <div class="p2e-simple-list" style="margin-top: 18px;">
          <a class="p2e-card p2e-link-row" href="./backup_mnemonic.html">
            <span class="p2e-option-icon" style="background: rgba(235, 240, 255, 0.96);"></span>
            <div class="p2e-list-copy">
              <strong>管理助记词</strong>
              <span>查看备份状态、重新校验</span>
            </div>
          </a>
          <a class="p2e-card p2e-link-row" href="./wallet_connect_session.html">
            <span class="p2e-option-icon" style="background: rgba(235, 240, 255, 0.96);"></span>
            <div class="p2e-list-copy">
              <strong>已登录设备</strong>
              <span>Android · Pixel 8 / Web</span>
            </div>
          </a>
          <a class="p2e-card p2e-link-row" href="./sign_message_confirm.html">
            <span class="p2e-option-icon" style="background: rgba(235, 240, 255, 0.96);"></span>
            <div class="p2e-list-copy">
              <strong>签名授权记录</strong>
              <span>已连接 6 个 DApp</span>
            </div>
          </a>
          <a class="p2e-card p2e-link-row" href="./dapp_browser.html">
            <span class="p2e-option-icon" style="background: rgba(235, 240, 255, 0.96);"></span>
            <div class="p2e-list-copy">
              <strong>风险地址提醒</strong>
              <span>自动拦截诈骗地址</span>
            </div>
          </a>
          <a class="p2e-card p2e-link-row" href="./swap.html">
            <span class="p2e-option-icon" style="background: rgba(235, 240, 255, 0.96);"></span>
            <div class="p2e-list-copy">
              <strong>生物识别支付</strong>
              <span>大额交易需指纹验证</span>
            </div>
          </a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>

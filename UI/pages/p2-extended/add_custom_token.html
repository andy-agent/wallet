<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>添加自定义代币</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/tokens.css">
  <link rel="stylesheet" href="../../shared/base.css">
  <link rel="stylesheet" href="../../shared/components.css">
  <link rel="stylesheet" href="../../shared/effects.css">
  <link rel="stylesheet" href="../../shared/p2-extended.css">
  <link rel="stylesheet" href="../../shared/p0-p1.css">
</head>
<body class="p2e-body">
  <main class="p2e-shell">
    <section class="p2e-phone accent-orange">
      <div class="p2e-layer p2e-layer-dust"></div>
      <div class="p2e-layer p2e-layer-glow"></div>
      <svg class="p2e-mesh" viewBox="0 0 220 220" aria-hidden="true">
        <path d="M20 42L94 20 164 62 176 126 116 182 54 128z"></path>
        <path d="M94 20L126 138 176 126 164 62 54 128 116 182"></path>
        <circle cx="20" cy="42" r="3"></circle>
        <circle cx="94" cy="20" r="3"></circle>
        <circle cx="164" cy="62" r="3"></circle>
        <circle cx="176" cy="126" r="3"></circle>
        <circle cx="116" cy="182" r="3"></circle>
        <circle cx="54" cy="128" r="3"></circle>
        <circle cx="126" cy="138" r="3"></circle>
      </svg>
      <div class="p2e-safe">
        <div class="p2e-status">
          <div>19:22</div>
          <div class="p2e-icons">
            <div class="p2e-signal"><span></span><span></span><span></span><span></span></div>
            <div class="p2e-wifi"></div>
            <div class="p2e-battery"></div>
          </div>
        </div>

        <header class="p2e-hero">
          <div class="p2e-kicker">Token Discovery</div>
          <h1 class="p2e-title">添加自定义代币</h1>
          <p class="p2e-subtitle">为缺失资产补齐展示与余额跟踪。</p>
          <a class="p2e-hub" href="./swap.html">
            <span class="p2e-hub-label">手动添加</span>
            <span class="p2e-hub-orb"></span>
          </a>
        </header>

        <section class="p2e-card p2e-panel">
          <h2 class="p2e-panel-title">代币信息</h2>
          <p class="p2e-panel-copy">输入合约地址后自动识别符号、精度与链。</p>
          <div class="p2e-fields">
            <label class="p2e-field-group">
              <span class="p2e-field-label">链网络</span>
              <input class="p2e-input" value="Base">
            </label>
            <label class="p2e-field-group">
              <span class="p2e-field-label">合约地址</span>
              <input class="p2e-input" value="0x8be1...c9Fd">
            </label>
            <label class="p2e-field-group">
              <span class="p2e-field-label">代币符号</span>
              <input class="p2e-input" value="USDC.e">
            </label>
            <label class="p2e-field-group">
              <span class="p2e-field-label">精度</span>
              <input class="p2e-input" value="6">
            </label>
          </div>
        </section>

        <div class="p2e-card p2e-note" style="margin-top: 16px;">
          <span class="p2e-note-icon"></span>
          <div>
            <strong>风险检查</strong>
            <span>合约通过基础校验，但请自行确认来源</span>
          </div>
        </div>

        <div class="p2e-page-bottom">
          <div class="p2e-actions">
            <a class="p2e-button p2e-button-primary" href="./swap.html">添加到资产列表</a>
            <a class="p2e-button p2e-button-secondary" href="./chain_manager.html">返回链管理</a>
          </div>
        </div>
        <nav class="p01-bottom-nav">
          <a class="p01-nav " href="../p0/vpn_home.html"><span class="p01-nav-icon"></span><span>总览</span></a>
          <a class="p01-nav " href="../p1/plans.html"><span class="p01-nav-icon"></span><span>VPN</span></a>
          <a class="p01-nav active" href="../p0/wallet_home.html"><span class="p01-nav-icon"></span><span>钱包</span></a>
          <a class="p01-nav " href="../p2-core/invite_center.html"><span class="p01-nav-icon"></span><span>增长</span></a>
          <a class="p01-nav " href="../p2-core/profile.html"><span class="p01-nav-icon"></span><span>我的</span></a>
        </nav>
      </div>
    </section>
  </main>
  <script src="../../shared/page-router.js"></script>
</body>
</html>

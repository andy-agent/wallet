<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>导入多链钱包</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/tokens.css">
  <link rel="stylesheet" href="../../shared/base.css">
  <link rel="stylesheet" href="../../shared/components.css">
  <link rel="stylesheet" href="../../shared/effects.css">
  <link rel="stylesheet" href="../../shared/p2-extended.css">
  <link rel="stylesheet" href="../../shared/p0-p1.css">
</head>
<body class="p01-body">
  <main class="p01-shell">
    <section class="p01-screen">
      <div class="p01-safe">
        <div class="p2e-status">
          <div>19:05</div>
          <div class="p2e-icons">
            <div class="p2e-signal"><span></span><span></span><span></span><span></span></div>
            <div class="p2e-wifi"></div>
            <div class="p2e-battery"></div>
          </div>
        </div>

        <header class="p2e-hero">
          <div class="p2e-kicker">WALLET IMPORT</div>
          <h1 class="p2e-title">导入多链钱包</h1>
          <p class="p2e-subtitle">补齐完整钱包能力：创建、导入、恢复与地址隔离。</p>
          <a class="p2e-hub" href="./security_center.html">
            <span class="p2e-hub-label">新增能力</span>
            <span class="p2e-hub-orb"></span>
          </a>
        </header>

        <section class="p2e-card p2e-panel">
          <h2 class="p2e-panel-title">选择导入方式</h2>
          <p class="p2e-panel-copy">支持助记词、私钥、Keystore 与观察钱包。</p>
          <div class="p2e-option-list" style="margin-top: 18px;">
            <a class="p2e-option" href="./import_mnemonic.html">
              <span class="p2e-option-icon"></span>
              <div>
                <div class="p2e-option-title">助记词导入</div>
                <div class="p2e-option-strong">适合完整恢复多链资产</div>
              </div>
            </a>
            <a class="p2e-option" href="./security_center.html">
              <span class="p2e-option-icon" style="background: rgba(91, 123, 255, 0.14);"></span>
              <div>
                <div class="p2e-option-title">私钥导入</div>
                <div class="p2e-option-strong">适合单地址快速恢复</div>
              </div>
            </a>
            <a class="p2e-option" href="./chain_manager.html">
              <span class="p2e-option-icon" style="background: rgba(143, 121, 255, 0.14);"></span>
              <div>
                <div class="p2e-option-title">Keystore / JSON</div>
                <div class="p2e-option-strong">适合 EVM 系资产</div>
              </div>
            </a>
          </div>
        </section>

        <a class="p2e-card p2e-link-row" href="./dapp_browser.html" style="margin-top: 18px;">
          <span class="p2e-option-icon" style="background: rgba(255, 152, 72, 0.16);"></span>
          <div class="p2e-list-copy">
            <strong>观察钱包</strong>
            <span>只读地址，不可签名</span>
          </div>
        </a>

        <div class="p2e-page-bottom">
          <div class="p2e-actions">
            <a class="p2e-button p2e-button-primary" href="./import_mnemonic.html">继续导入</a>
            <a class="p2e-button p2e-button-secondary" href="./security_center.html">返回钱包引导</a>
          </div>
        </div>
        <nav class="p01-bottom-nav">
          <a class="p01-nav " href="../p0/vpn_home.html"><span class="p01-nav-icon"></span><span>总览</span></a>
          <a class="p01-nav " href="../p1/plans.html"><span class="p01-nav-icon"></span><span>VPN</span></a>
          <a class="p01-nav active" href="../p0/wallet_home.html"><span class="p01-nav-icon"></span><span>钱包</span></a>
          <a class="p01-nav " href="../p2-core/invite_center.html"><span class="p01-nav-icon"></span><span>增长</span></a>
          <a class="p01-nav " href="../p2-core/profile.html"><span class="p01-nav-icon"></span><span>我的</span></a>
        </nav>
      </div>
    </section>
  </main>
  <script src="../../shared/page-router.js"></script>
</body>
</html>

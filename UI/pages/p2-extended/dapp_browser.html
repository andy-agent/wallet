<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DApp 浏览器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/tokens.css">
  <link rel="stylesheet" href="../../shared/base.css">
  <link rel="stylesheet" href="../../shared/components.css">
  <link rel="stylesheet" href="../../shared/effects.css">
  <link rel="stylesheet" href="../../shared/p2-extended.css">
</head>
<body class="p2e-body">
  <main class="p2e-shell">
    <section class="p2e-phone accent-violet p2e-short">
      <div class="p2e-layer p2e-layer-dust"></div>
      <div class="p2e-layer p2e-layer-glow"></div>
      <svg class="p2e-mesh" viewBox="0 0 220 220" aria-hidden="true">
        <path d="M66 22L116 30 156 94 206 118 170 182 110 200 72 126z"></path>
        <path d="M116 30L124 124 110 200 206 118"></path>
        <circle cx="66" cy="22" r="3"></circle>
        <circle cx="116" cy="30" r="3"></circle>
        <circle cx="156" cy="94" r="3"></circle>
        <circle cx="206" cy="118" r="3"></circle>
        <circle cx="170" cy="182" r="3"></circle>
        <circle cx="110" cy="200" r="3"></circle>
        <circle cx="72" cy="126" r="3"></circle>
        <circle cx="124" cy="124" r="3"></circle>
      </svg>
      <div class="p2e-safe">
        <div class="p2e-status">
          <div>19:32</div>
          <div class="p2e-icons">
            <div class="p2e-signal"><span></span><span></span><span></span><span></span></div>
            <div class="p2e-wifi"></div>
            <div class="p2e-battery"></div>
          </div>
        </div>

        <header class="p2e-hero">
          <div class="p2e-kicker">DApp Browser</div>
          <h1 class="p2e-title">DApp 浏览器</h1>
          <p class="p2e-subtitle">补齐链上应用入口，并统一签名与风险提示体验。</p>
          <a class="p2e-hub" href="./wallet_connect_session.html">
            <span class="p2e-hub-label">内置浏览器</span>
            <span class="p2e-hub-orb"></span>
          </a>
        </header>

        <div class="p2e-card p2e-search">
          <span class="p2e-search-icon"></span>
          <div class="p2e-search-input">输入 URL / 搜索 DApp / 输入 ENS</div>
          <a class="p2e-search-action" href="./wallet_connect_session.html">访问</a>
        </div>

        <div class="p2e-filter-row">
          <span class="p2e-chip is-active">精选</span>
          <span class="p2e-chip">DeFi</span>
          <span class="p2e-chip">支付</span>
          <span class="p2e-chip">NFT</span>
          <span class="p2e-chip">工具</span>
        </div>

        <div class="p2e-simple-list" style="margin-top: 18px;">
          <a class="p2e-card p2e-app-row" href="./wallet_connect_session.html">
            <span class="p2e-app-badge"></span>
            <div class="p2e-list-copy">
              <strong>Jupiter</strong>
              <span>Solana 聚合兑换</span>
            </div>
            <span class="p2e-app-meta">92K users</span>
          </a>
          <a class="p2e-card p2e-app-row" href="./wallet_connect_session.html">
            <span class="p2e-app-badge"></span>
            <div class="p2e-list-copy">
              <strong>Sunswap</strong>
              <span>TRON 稳定币兑换</span>
            </div>
            <span class="p2e-app-meta">31K users</span>
          </a>
          <a class="p2e-card p2e-app-row" href="./wallet_connect_session.html">
            <span class="p2e-app-badge"></span>
            <div class="p2e-list-copy">
              <strong>Aave</strong>
              <span>借贷与收益</span>
            </div>
            <span class="p2e-app-meta">120K users</span>
          </a>
          <a class="p2e-card p2e-app-row" href="./wallet_connect_session.html">
            <span class="p2e-app-badge"></span>
            <div class="p2e-list-copy">
              <strong>OpenOcean</strong>
              <span>跨链路由</span>
            </div>
            <span class="p2e-app-meta">58K users</span>
          </a>
          <a class="p2e-card p2e-app-row" href="./wallet_connect_session.html">
            <span class="p2e-app-badge"></span>
            <div class="p2e-list-copy">
              <strong>Magic Eden</strong>
              <span>NFT 市场</span>
            </div>
            <span class="p2e-app-meta">63K users</span>
          </a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>01 Splash</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body class="single-page">
    <main class="page-frame">
      <div class="page-stack">
        <header class="status-bar">
          <span>18:05</span>
          <div class="status-icons">
            <span class="signal"><span></span><span></span><span></span></span>
            <span>◔</span>
            <span class="battery"></span>
          </div>
        </header>

        <section>
          <div class="eyebrow">CRYPTO • VPN • PRIVATE NETWORK</div>
          <div class="hero-row" style="margin-top: 10px">
            <div style="flex: 1">
              <h1 class="page-title" style="font-size: 22px">CryptoVPN</h1>
              <p class="page-subtitle">
                多链钱包 + 私密高速网络<br />
                在一个自底层私化的 Android 体验里完成。
              </p>
            </div>
            <div class="hero-ring">
              <div class="ring-center">
                ◎
                <div>SECURE HUB</div>
              </div>
            </div>
          </div>
          <div class="chip-row" style="margin-top: 14px">
            <span class="chip is-blue">安全白托管</span>
            <span class="chip is-green">全球加速</span>
            <span class="chip is-violet">Solana / TRON</span>
          </div>
        </section>

        <section class="surface-card" style="margin-top: 6px; padding: 18px">
          <p class="card-title">链式连接</p>
          <div class="headline-emphasis" style="font-size: 17px">连接钱包与网络</div>
          <div class="dual-grid" style="margin-top: 14px">
            <div class="mini-card">
              <div class="metric-label">Wallet Layer</div>
              <div class="metric-value" style="font-size: 30px">4</div>
              <div class="metric-caption">链架构 · 实时风险隔离</div>
            </div>
            <div class="mini-card">
              <div class="metric-label">VPN Layer</div>
              <div class="metric-value" style="font-size: 30px">62</div>
              <div class="metric-caption">节点 · 智能路由</div>
            </div>
          </div>
          <div style="margin-top: 12px" class="progress-track">
            <div class="progress-fill" style="width: 78%"></div>
          </div>
          <p class="card-subtitle" style="margin-top: 10px">
            初始化加密模块、节点探测与资产索引…
          </p>
        </section>

        <div class="flex-spacer"></div>
        <p class="footnote">
          电影版权子屏蔽、航运环境关联代理将在启动过程中持续动态调整。
        </p>
      </div>
    </main>
  </body>
</html>

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>02 Login</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body class="single-page">
    <main class="page-frame">
      <div class="page-stack" style="padding-bottom: 74px">
        <header class="status-bar">
          <span>18:06</span>
          <div class="status-icons">
            <span class="signal"><span></span><span></span><span></span></span>
            <span>◔</span>
            <span class="battery"></span>
          </div>
        </header>

        <section>
          <div class="eyebrow">ACCESS HUB</div>
          <div class="title-row" style="margin-top: 10px">
            <div>
              <h1 class="page-title">登录钱包</h1>
              <p class="page-subtitle">
                用链上身份接入私密网络。首次登录会绑定收款与支付路径。
              </p>
            </div>
            <span class="badge-pill is-safe">安全握手</span>
          </div>
        </section>

        <section class="surface-card">
          <div class="section-label">
            <span>推荐连接</span>
            <span>兼容 12 种钱包</span>
          </div>
          <div class="list-stack" style="margin-top: 12px">
            <div class="list-item">
              <span class="mini-icon">P</span>
              <div class="list-copy">
                <strong>Phantom</strong>
                <span>Solana 资产优先，适合高频节点切换。</span>
              </div>
              <span class="tiny-badge is-live">推荐</span>
            </div>
            <div class="list-item">
              <span class="mini-icon is-violet">T</span>
              <div class="list-copy">
                <strong>Trust Wallet</strong>
                <span>多链兼容，适合作为默认资产钱包。</span>
              </div>
            </div>
            <div class="list-item">
              <span class="mini-icon is-green">W</span>
              <div class="list-copy">
                <strong>WalletConnect</strong>
                <span>扫码连接已有移动钱包，保留原账户状态。</span>
              </div>
            </div>
          </div>
        </section>

        <section class="surface-card">
          <div class="section-label">
            <span>备用接入</span>
            <span>临时身份</span>
          </div>
          <div class="button-row" style="margin-top: 12px">
            <button class="secondary-button">游客试用</button>
            <button class="secondary-button">邮箱恢复</button>
          </div>
          <div class="divider-line"></div>
          <div class="section-label">
            <span>登录后同步</span>
          </div>
          <div class="chip-row" style="margin-top: 10px">
            <span class="chip is-blue">节点历史</span>
            <span class="chip is-green">风险白名单</span>
            <span class="chip is-violet">支付偏好</span>
          </div>
        </section>

        <div class="flex-spacer"></div>
        <div class="cta-dock">
          <button class="primary-button">连接并继续</button>
        </div>
      </div>
    </main>
  </body>
</html>

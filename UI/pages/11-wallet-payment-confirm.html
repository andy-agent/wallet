<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>11 Wallet Payment Confirm</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body class="single-page">
    <main class="page-frame">
      <div class="page-stack" style="padding-bottom: 78px">
        <header class="status-bar">
          <span>18:14</span>
          <div class="status-icons">
            <span class="signal"><span></span><span></span><span></span></span>
            <span>◔</span>
            <span class="battery"></span>
          </div>
        </header>

        <section>
          <div class="eyebrow">WALLET PAYMENT</div>
          <div class="title-row" style="margin-top: 10px">
            <div>
              <h1 class="page-title">钱包支付确认</h1>
              <p class="page-subtitle">
                把 VPN 续费变成标准的钱包支付流，而不是额外外跳。
              </p>
            </div>
            <span class="badge-pill is-safe">链路安全</span>
          </div>
        </section>

        <section class="surface-card">
          <div class="pill-split">
            <div class="card-title">订单摘要</div>
            <span class="tiny-muted">订单 #CVP-2409</span>
          </div>
          <div class="summary-table" style="margin-top: 12px">
            <div class="table-row"><span>套餐</span><strong>年度 Pro</strong></div>
            <div class="table-row"><span>可用设备</span><strong>5 台</strong></div>
            <div class="table-row"><span>节点权益</span><strong>高速专线 + 智能分流</strong></div>
            <div class="table-row"><span>支付资产</span><strong>USDT · TRON</strong></div>
            <div class="table-row"><span>支付金额</span><strong>580 USDT</strong></div>
            <div class="table-row"><span>网络费</span><strong>1.24 USDT</strong></div>
            <div class="table-row"><span>预计开通</span><strong>1 分钟内</strong></div>
          </div>
        </section>

        <section class="dual-grid">
          <div class="mini-card">
            <div class="metric-label">剩余余额</div>
            <div class="metric-value" style="font-size: 24px">12,781.99</div>
            <div class="metric-caption">支付后</div>
          </div>
          <div class="mini-card">
            <div class="metric-label">额外收益</div>
            <div class="metric-value" style="font-size: 24px">已加密</div>
            <div class="metric-caption">VPN 广播交易</div>
          </div>
        </section>

        <section class="surface-card">
          <div class="section-label">
            <span>风控提示</span>
            <span>建议查看</span>
          </div>
          <div class="list-stack" style="margin-top: 12px">
            <div class="list-item">
              <span class="mini-icon">•</span>
              <div class="list-copy">
                <strong>收款地址已绑定官方账户</strong>
                <span>本次支付不会跳转到陌生收款方</span>
              </div>
            </div>
            <div class="list-item">
              <span class="mini-icon is-green">•</span>
              <div class="list-copy">
                <strong>当前节点延迟稳定</strong>
                <span>当前交易不会因链上广播异常造成失败</span>
              </div>
            </div>
          </div>
        </section>

        <div class="flex-spacer"></div>
        <div class="cta-dock">
          <button class="primary-button">确认支付并开通</button>
        </div>
      </div>
    </main>
  </body>
</html>

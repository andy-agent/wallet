<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>06 Purchase Confirm</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body class="single-page">
    <main class="page-frame">
      <div class="page-stack" style="padding-bottom: 76px">
        <header class="status-bar">
          <span>18:10</span>
          <div class="status-icons">
            <span class="signal"><span></span><span></span><span></span></span>
            <span>◔</span>
            <span class="battery"></span>
          </div>
        </header>

        <section>
          <div class="eyebrow">PLAN CHECKOUT</div>
          <div class="title-row" style="margin-top: 10px">
            <div>
              <h1 class="page-title">购买确认</h1>
              <p class="page-subtitle">
                在支付前确认套餐、网络层与钱包扣款链路，避免跨链冲突。
              </p>
            </div>
            <span class="badge-pill is-safe">线路已校验</span>
          </div>
        </section>

        <section class="surface-card">
          <div class="section-label">
            <span>订单摘要</span>
            <span>订单 #CVP-2045</span>
          </div>
          <div class="summary-table" style="margin-top: 12px">
            <div class="table-row"><span>套餐</span><strong>年度 Pro</strong></div>
            <div class="table-row"><span>可用设备</span><strong>5 台</strong></div>
            <div class="table-row"><span>节点权益</span><strong>高速专线 + 智能分流</strong></div>
            <div class="table-row"><span>支付网络</span><strong>USDT · TRON</strong></div>
            <div class="table-row"><span>应付金额</span><strong>580 USDT</strong></div>
            <div class="table-row"><span>预计开通</span><strong>1 分钟内</strong></div>
          </div>
        </section>

        <section class="surface-card">
          <div class="section-label">
            <span>支付路径</span>
            <span>自动推荐</span>
          </div>
          <div class="dual-grid" style="margin-top: 12px">
            <div class="mini-card">
              <div class="metric-label">主钱包</div>
              <div class="metric-value" style="font-size: 22px">12,781.99</div>
              <div class="metric-caption">USDT 可用</div>
            </div>
            <div class="mini-card">
              <div class="metric-label">节点增益</div>
              <div class="metric-value" style="font-size: 22px">已加密</div>
              <div class="metric-caption">VPN 广播交易</div>
            </div>
          </div>
          <div class="chip-row" style="margin-top: 12px">
            <span class="chip is-green">主钱包优先</span>
            <span class="chip is-blue">广播经 VPN</span>
            <span class="chip is-violet">Gas 已估算</span>
          </div>
        </section>

        <div class="cta-dock">
          <button class="primary-button">确认购买并开通</button>
        </div>
      </div>
    </main>
  </body>
</html>

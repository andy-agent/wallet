<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Splash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/tokens.css">
  <link rel="stylesheet" href="../../shared/base.css">
  <link rel="stylesheet" href="../../shared/components.css">
  <link rel="stylesheet" href="../../shared/effects.css">
  <link rel="stylesheet" href="../../shared/p0-p1.css">
</head>
<body class="p01-body">
  <main class="p01-shell">
    <section class="p01-screen">
      <div class="p01-safe">
        <div class="p01-status"><span>18:05</span><div class="p01-icons"><span>VPN</span><span>100%</span></div></div>
        <header class="p01-header">
          <div class="p01-eyebrow">CRYPTO · VPN · PRIVATE NETWORK</div>
          <h1 class="p01-title">CryptoVPN</h1>
          <p class="p01-subtitle">多链钱包 + 私密高速网络，在一个自由科技化的 Android 体验里完成。</p>
          <div class="p01-chip-row">
            <span class="p01-chip">安全自托管</span>
            <span class="p01-chip">全球加速</span>
            <span class="p01-chip">Solana / TRON</span>
          </div>
        </header>
        <section class="p01-body-grid">
          <article class="p01-card p01-hero">
            <div class="p01-hero-split">
              <div>
                <div class="p01-card-title">连接钱包与网络</div>
                <p class="p01-card-copy">启动页直接传达 Secure Hub 心智，并把钱包与节点能力并列展示。</p>
              </div>
              <div class="p01-orb"></div>
            </div>
            <div class="p01-metric-grid">
              <div class="p01-metric"><div class="p01-metric-label">Wallet Layer</div><div class="p01-metric-value">4</div></div>
              <div class="p01-metric"><div class="p01-metric-label">VPN Layer</div><div class="p01-metric-value">62</div></div>
            </div>
          </article>
          <div class="p01-actions">
            <a class="p01-button-primary" href="./email_login.html">进入登录</a>
            <a class="p01-button-secondary" href="./wallet_onboarding.html">钱包引导</a>
          </div>
        </section>
      </div>
    </section>
  </main>
</body>
</html>

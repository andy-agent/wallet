<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>08 Asset Detail</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body class="single-page">
    <main class="page-frame">
      <div class="page-stack">
        <header class="status-bar">
          <span>18:06</span>
          <div class="status-icons">
            <span class="signal"><span></span><span></span><span></span></span>
            <span>◔</span>
            <span class="battery"></span>
          </div>
        </header>

        <section>
          <div class="title-row" style="align-items: center">
            <div style="display: flex; align-items: center; gap: 8px">
              <span style="font-size: 18px; color: var(--text-soft)">←</span>
              <div>
                <div class="page-title" style="font-size: 18px; margin: 0">ENJ / Enjin Coin</div>
              </div>
            </div>
            <span class="badge-pill">关注</span>
          </div>
          <div style="margin-top: 12px">
            <div class="metric-value" style="font-size: 24px">$0.24 <span style="font-size: 16px; color: var(--mint)">+44.12%</span></div>
            <div class="metric-caption">市值：$246M</div>
          </div>
        </section>

        <section class="chart-shell">
          <div class="chart-top">
            <div>
              <div class="metric-label">24h</div>
            </div>
            <div class="metric-caption">0.24</div>
          </div>
          <div class="chart-wrap">
            <svg viewBox="0 0 340 180" role="img" aria-label="asset trend">
              <defs>
                <linearGradient id="detailLine" x1="0%" y1="100%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#2fd1ff"></stop>
                  <stop offset="100%" stop-color="#43cf8f"></stop>
                </linearGradient>
              </defs>
              <g stroke="rgba(145, 164, 210, 0.18)">
                <line x1="0" y1="36" x2="340" y2="36"></line>
                <line x1="0" y1="72" x2="340" y2="72"></line>
                <line x1="0" y1="108" x2="340" y2="108"></line>
                <line x1="0" y1="144" x2="340" y2="144"></line>
              </g>
              <path d="M8 122 L34 118 L60 126 L86 120 L112 108 L138 102 L164 96 L190 90 L216 82 L242 74 L268 54 L294 60 L320 44" fill="none" stroke="url(#detailLine)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"></path>
              <g fill="#4fd4bc">
                <circle cx="320" cy="44" r="5"></circle>
              </g>
            </svg>
          </div>
        </section>

        <div class="tabs">
          <span class="seg-pill is-active">23H</span>
          <span class="seg-pill">4H</span>
          <span class="seg-pill">1D</span>
          <span class="seg-pill">1W</span>
          <span class="seg-pill">1M</span>
          <span class="seg-pill">更多</span>
        </div>

        <section class="surface-card">
          <div class="list-stack">
            <div class="list-item">
              <span class="mini-icon is-amber">!</span>
              <div class="list-copy">
                <strong>风险信号</strong>
                <span>价格抬升过快，短线资金可能离场。</span>
              </div>
            </div>
            <div class="list-item">
              <span class="mini-icon is-amber">△</span>
              <div class="list-copy">
                <strong>波动率异常</strong>
                <span>近 6 小时振幅高于日均值。</span>
              </div>
            </div>
            <div class="list-item">
              <span class="mini-icon is-green">+</span>
              <div class="list-copy">
                <strong>近时资金快速流入</strong>
                <span>社交热度与委托深度同步提升。</span>
              </div>
            </div>
          </div>
        </section>

        <section class="surface-card ai-card">
          <div class="ai-mark">AI</div>
          <div>
            <div class="card-title">AI 判断</div>
            <p class="page-subtitle" style="margin-top: 6px">
              短期走势偏强，存在回调风险。建议：谨慎追高。
            </p>
          </div>
        </section>

        <section class="chart-shell">
          <div class="chart-top">
            <div class="tabs" style="gap: 6px">
              <span class="seg-pill is-active">1H ~ 4H</span>
              <span class="seg-pill">前日</span>
              <span class="seg-pill">某天</span>
              <span class="seg-pill">页览</span>
            </div>
          </div>
          <div class="chart-wrap">
            <svg viewBox="0 0 340 120" role="img" aria-label="mini trend">
              <path d="M0 90 L30 92 L60 88 L90 86 L120 84 L150 82 L180 82 L210 84 L240 80 L270 68 L300 48 L330 32" fill="none" stroke="#76e0c7" stroke-width="4" stroke-linecap="round"></path>
              <g fill="#ff7a90">
                <circle cx="150" cy="82" r="3"></circle>
                <circle cx="180" cy="82" r="3"></circle>
              </g>
            </svg>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>

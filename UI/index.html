<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CryptoVPN H5 App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./shared/tokens.css">
  <link rel="stylesheet" href="./shared/base.css">
  <link rel="stylesheet" href="./shared/components.css">
  <link rel="stylesheet" href="./shared/effects.css">
</head>
<body class="gallery-body app-shell-body">
  <div class="gallery-noise"></div>
  <div class="gallery-aurora gallery-aurora-a"></div>
  <div class="gallery-aurora gallery-aurora-b"></div>

  <main class="app-shell">
    <section class="app-overview glass-panel">
      <div class="eyebrow">UNIFIED H5 ROUTER</div>
      <h1>CryptoVPN 浏览器路由壳</h1>
      <p class="hero-copy">当前入口是统一 H5 应用。左侧是页面路由，右侧是手机预览。页面内部按钮会回流到这里，而不是散落成独立跳转。</p>
      <div class="hero-stats" id="hero-stats"></div>
    </section>

    <section class="app-workspace">
      <aside class="route-panel glass-panel">
        <div class="route-panel-header">
          <div>
            <div class="eyebrow">ROUTES</div>
            <h2>页面入口</h2>
          </div>
          <span class="status-chip" id="route-count"></span>
        </div>
        <div class="route-phase-list" id="route-phase-list"></div>
      </aside>

      <section class="preview-panel glass-panel">
        <div class="preview-header">
          <div>
            <div class="eyebrow">CURRENT ROUTE</div>
            <h2 id="current-title">加载中</h2>
            <p class="phase-copy" id="current-copy"></p>
          </div>
          <div class="preview-actions">
            <a class="page-link" id="open-standalone" href="./pages/p0/splash.html" target="_blank" rel="noreferrer">单独打开</a>
          </div>
        </div>
        <div class="preview-frame-wrap">
          <iframe id="app-frame" class="app-frame" title="CryptoVPN H5 Preview"></iframe>
        </div>
      </section>
    </section>
  </main>

  <script src="./shared/routes.js"></script>
  <script src="./shared/app.js"></script>
</body>
</html>

name: backend-ci

on:
  push:
    paths:
      - 'code/backend/**'
      - 'final_engineering_delivery_package/**'
      - 'code/deploy/backend-ci.github-actions.yml'
  pull_request:
    paths:
      - 'code/backend/**'
      - 'final_engineering_delivery_package/**'
      - 'code/deploy/backend-ci.github-actions.yml'

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: code/backend/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: E2E
        run: pnpm run test:e2e

paths:
  /api/public/v1/app/version/latest:
    get:
      tags:
      - Public
      summary: 获取最新版本
      description: 启动页版本检查与强更。角色：public_guest。页面：启动页/强更页。表：app_versions
      operationId: op_get
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionCheckResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Internal Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
      parameters:
      - name: platform
        in: query
        schema:
          type: string
          enum:
          - android
        required: true
      - name: channel
        in: query
        schema:
          type: string
          enum:
          - official
        required: true
      - name: currentVersionCode
        in: query
        schema:
          type: integer
        required: false

openapi: 3.0.3
info:
  title: CryptoVPN OpenAPI v1
  version: 1.0.0
  description: 最终开发启动包唯一 API 契约。技术实现推荐 NestJS，契约独立于具体框架。
servers:
- url: https://{publicHost}
  variables:
    publicHost:
      default: api.example.com
tags:
- name: Public
- name: ClientAuth
- name: ClientAccount
- name: Plans
- name: Subscription
- name: VPN
- name: Orders
- name: Wallet
- name: Referral
- name: Commissions
- name: Withdrawals
- name: AdminAuth
- name: AdminDashboard
- name: AdminAccounts
- name: AdminPlans
- name: AdminVPN
- name: AdminOrders
- name: AdminCommissions
- name: AdminWithdrawals
- name: AdminVersions
- name: AdminLegal
- name: AdminConfig
- name: AdminAudit
components:
  securitySchemes:
    ClientBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
    AdminBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiError:
      type: object
      description: 统一错误响应。requestId 必须与本次请求的结构化日志关联；若该请求产生审计记录，则应能通过审计表或日志系统按 requestId 回查。
      properties:
        requestId:
          type: string
          format: uuid
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
        details:
          type: object
          additionalProperties: true
      required:
      - requestId
      - code
      - message
    PageMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 20
        total:
          type: integer
          example: 100
        sortBy:
          type: string
          nullable: true
        sortOrder:
          type: string
          enum:
          - asc
          - desc
          nullable: true
      required:
      - page
      - pageSize
      - total
    EmptyData:
      type: object
      additionalProperties: false
    RegisterEmailCodeRequest:
      type: object
      properties:
        email:
          type: string
          example: user@example.com
      required:
      - email
    RegisterEmailRequest:
      type: object
      properties:
        email:
          type: string
          example: user@example.com
        code:
          type: string
          example: '123456'
        password:
          type: string
          example: Passw0rd!
        installationId:
          type: string
          nullable: true
          example: ins_123
      required:
      - email
      - code
      - password
      description: 需配合 X-Idempotency-Key header 使用，按 email + idempotencyKey 防重
    LoginPasswordRequest:
      type: object
      properties:
        email:
          type: string
          example: user@example.com
        password:
          type: string
          example: Passw0rd!
        installationId:
          type: string
          nullable: true
          example: ins_123
      required:
      - email
      - password
    RefreshTokenRequest:
      type: object
      properties:
        refreshToken:
          type: string
        installationId:
          type: string
          nullable: true
      required:
      - refreshToken
    LogoutRequest:
      type: object
      properties:
        reason:
          type: string
          nullable: true
      required: []
    PasswordResetCodeRequest:
      type: object
      properties:
        email:
          type: string
          example: user@example.com
      required:
      - email
    PasswordResetRequest:
      type: object
      properties:
        email:
          type: string
          example: user@example.com
        code:
          type: string
          example: '123456'
        newPassword:
          type: string
          example: Passw0rd!
      required:
      - email
      - code
      - newPassword
      description: 需配合 X-Idempotency-Key header 使用，按 email + idempotencyKey 防重
    IssueVpnConfigRequest:
      type: object
      properties:
        regionCode:
          type: string
        connectionMode:
          type: string
          enum:
          - global
          - rule
      required:
      - regionCode
      - connectionMode
    CreateOrderRequest:
      type: object
      properties:
        planCode:
          type: string
        orderType:
          type: string
          enum:
          - NEW
          - RENEWAL
        quoteAssetCode:
          type: string
          enum:
          - SOL
          - USDT
        quoteNetworkCode:
          type: string
          enum:
          - SOLANA
          - TRON
      required:
      - planCode
      - orderType
      - quoteAssetCode
      - quoteNetworkCode
      description: 需配合 X-Idempotency-Key header 使用，必须幂等
    SubmitClientTxRequest:
      type: object
      properties:
        txHash:
          type: string
        networkCode:
          type: string
          enum:
          - SOLANA
          - TRON
        signedAt:
          type: string
          format: date-time
          nullable: true
      required:
      - txHash
      - networkCode
    RefreshOrderStatusRequest:
      type: object
      properties:
        clientObservedStatus:
          type: string
          nullable: true
      required: []
    UpsertWalletPublicAddressRequest:
      type: object
      properties:
        networkCode:
          type: string
          enum:
          - SOLANA
          - TRON
        assetCode:
          type: string
          enum:
          - SOL
          - TRX
          - USDT
        address:
          type: string
        isDefault:
          type: boolean
      required:
      - networkCode
      - assetCode
      - address
    TransferPrecheckRequest:
      type: object
      properties:
        networkCode:
          type: string
          enum:
          - SOLANA
          - TRON
        assetCode:
          type: string
          enum:
          - SOL
          - TRX
          - USDT
        toAddress:
          type: string
        amount:
          type: string
          description: decimal string
          example: '10.5'
        orderNo:
          type: string
          nullable: true
      required:
      - networkCode
      - assetCode
      - toAddress
      - amount
    ProxyBroadcastRequest:
      type: object
      properties:
        networkCode:
          type: string
          enum:
          - SOLANA
          - TRON
        assetCode:
          type: string
          enum:
          - SOL
          - TRX
          - USDT
        signedPayload:
          type: string
        clientTxHash:
          type: string
          nullable: true
      required:
      - networkCode
      - assetCode
      - signedPayload
    ReferralBindRequest:
      type: object
      properties:
        referralCode:
          type: string
      required:
      - referralCode
    CreateWithdrawalRequest:
      type: object
      properties:
        amount:
          type: string
          description: decimal string
          example: '12.5'
        payoutAddress:
          type: string
        assetCode:
          type: string
          enum:
          - USDT
        networkCode:
          type: string
          enum:
          - SOLANA
      required:
      - amount
      - payoutAddress
      - assetCode
      - networkCode
      description: 需配合 X-Idempotency-Key header 使用，必须幂等
    AdminLoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
      - username
      - password
    AdminLogoutRequest:
      type: object
      properties:
        reason:
          type: string
          nullable: true
      required: []
    AdminAccountStatusChangeRequest:
      type: object
      properties:
        reason:
          type: string
      required:
      - reason
    AdminEvictSessionsRequest:
      type: object
      properties:
        reason:
          type: string
      required:
      - reason
    AdminPlanUpsertRequest:
      type: object
      properties:
        planCode:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        billingCycleMonths:
          type: integer
        priceUsd:
          type: string
          description: decimal string
        maxActiveSessions:
          type: integer
        regionAccessPolicy:
          type: string
          enum:
          - BASIC_ONLY
          - INCLUDE_ADVANCED
          - CUSTOM
        includesAdvancedRegions:
          type: boolean
        allowedRegionIds:
          type: array
          items:
            type: string
            format: uuid
        status:
          type: string
          enum:
          - DRAFT
          - ACTIVE
          - DISABLED
          nullable: true
        displayOrder:
          type: integer
      required:
      - planCode
      - name
      - billingCycleMonths
      - priceUsd
      - maxActiveSessions
      - regionAccessPolicy
      - includesAdvancedRegions
      - allowedRegionIds
      - displayOrder
    AdminPublishPlanRequest:
      type: object
      properties:
        note:
          type: string
          nullable: true
      required: []
    AdminDisablePlanRequest:
      type: object
      properties:
        reason:
          type: string
      required:
      - reason
    AdminRegionUpsertRequest:
      type: object
      properties:
        regionCode:
          type: string
        displayName:
          type: string
        tier:
          type: string
          enum:
          - BASIC
          - ADVANCED
        status:
          type: string
          enum:
          - ACTIVE
          - MAINTENANCE
          - DISABLED
        sortOrder:
          type: integer
        remark:
          type: string
          nullable: true
      required:
      - regionCode
      - displayName
      - tier
      - status
      - sortOrder
    AdminNodeUpsertRequest:
      type: object
      properties:
        regionId:
          type: string
          format: uuid
        nodeCode:
          type: string
        host:
          type: string
        port:
          type: integer
        realityPublicKey:
          type: string
          nullable: true
        serverName:
          type: string
          nullable: true
        shortId:
          type: string
          nullable: true
        flow:
          type: string
          nullable: true
        weight:
          type: integer
        status:
          type: string
          enum:
          - ACTIVE
          - MAINTENANCE
          - DISABLED
        healthStatus:
          type: string
          enum:
          - UNKNOWN
          - HEALTHY
          - DEGRADED
          - OFFLINE
          nullable: true
      required:
      - regionId
      - nodeCode
      - host
      - port
      - weight
      - status
    AdminDisableNodeRequest:
      type: object
      properties:
        reason:
          type: string
      required:
      - reason
    AdminMarkOrderExceptionRequest:
      type: object
      properties:
        exceptionCode:
          type: string
          enum:
          - UNDERPAID
          - OVERPAID
          - WRONG_ASSET
          - WRONG_NETWORK
          - LATE_PAYMENT
          - MANUAL_REVIEW
        note:
          type: string
          nullable: true
      required:
      - exceptionCode
    AdminRetryProvisionRequest:
      type: object
      properties:
        note:
          type: string
          nullable: true
      required: []
    AdminApproveWithdrawalRequest:
      type: object
      properties:
        note:
          type: string
          nullable: true
      required: []
    AdminRejectWithdrawalRequest:
      type: object
      properties:
        reason:
          type: string
      required:
      - reason
    AdminRecordPayoutRequest:
      type: object
      properties:
        txHash:
          type: string
        networkCode:
          type: string
          enum:
          - SOLANA
        note:
          type: string
          nullable: true
      required:
      - txHash
      - networkCode
    AdminRetryBroadcastRequest:
      type: object
      properties:
        note:
          type: string
          nullable: true
      required: []
    AdminAppVersionCreateRequest:
      type: object
      properties:
        platform:
          type: string
          enum:
          - android
        channel:
          type: string
          enum:
          - official
        versionName:
          type: string
        versionCode:
          type: integer
        minSupportedCode:
          type: integer
        forceUpdate:
          type: boolean
        downloadUrl:
          type: string
        sha256:
          type: string
        releaseNotes:
          type: string
      required:
      - platform
      - channel
      - versionName
      - versionCode
      - minSupportedCode
      - forceUpdate
      - downloadUrl
      - sha256
      - releaseNotes
    AdminAppVersionPublishRequest:
      type: object
      properties:
        note:
          type: string
          nullable: true
      required: []
    AdminLegalDocumentUpsertRequest:
      type: object
      properties:
        title:
          type: string
        versionNo:
          type: integer
        markdownContent:
          type: string
        status:
          type: string
          enum:
          - DRAFT
          - PUBLISHED
          - DEPRECATED
          nullable: true
      required:
      - title
      - versionNo
      - markdownContent
    AdminPublishLegalDocumentRequest:
      type: object
      properties:
        note:
          type: string
          nullable: true
      required: []
    AdminSystemConfigUpdateRequest:
      type: object
      properties:
        configValue:
          type: string
        note:
          type: string
          nullable: true
      required:
      - configValue
    TokenPairData:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        accessTokenExpiresAt:
          type: string
          format: date-time
        refreshTokenExpiresAt:
          type: string
          format: date-time
        accountId:
          type: string
          format: uuid
        accountStatus:
          type: string
          enum:
          - ACTIVE
          - FROZEN
          - CLOSED
      required:
      - accessToken
      - refreshToken
      - accessTokenExpiresAt
      - refreshTokenExpiresAt
      - accountId
      - accountStatus
    AdminLoginData:
      type: object
      properties:
        accessToken:
          type: string
        accessTokenExpiresAt:
          type: string
          format: date-time
        adminId:
          type: string
          format: uuid
        role:
          type: string
          enum:
          - SUPER_ADMIN
          - OPS_ADMIN
          - FINANCE_ADMIN
          - SUPPORT_ADMIN
      required:
      - accessToken
      - accessTokenExpiresAt
      - adminId
      - role
    SubscriptionData:
      type: object
      properties:
        subscriptionId:
          type: string
          format: uuid
          nullable: true
        planCode:
          type: string
          nullable: true
        status:
          type: string
          enum:
          - PENDING_ACTIVATION
          - ACTIVE
          - EXPIRED
          - SUSPENDED
          - CANCELED
          - NONE
        startedAt:
          type: string
          format: date-time
          nullable: true
        expireAt:
          type: string
          format: date-time
          nullable: true
        daysRemaining:
          type: integer
          nullable: true
        isUnlimitedTraffic:
          type: boolean
        maxActiveSessions:
          type: integer
      required:
      - status
      - isUnlimitedTraffic
      - maxActiveSessions
    MeData:
      type: object
      properties:
        accountId:
          type: string
          format: uuid
        email:
          type: string
        status:
          type: string
          enum:
          - ACTIVE
          - FROZEN
          - CLOSED
        referralCode:
          type: string
        subscription:
          $ref: '#/components/schemas/SubscriptionData'
      required:
      - accountId
      - email
      - status
      - referralCode
    SessionSummaryData:
      type: object
      properties:
        sessionId:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - ACTIVE
          - EVICTED
          - REVOKED
          - EXPIRED
        installationId:
          type: string
          nullable: true
        expiresAt:
          type: string
          format: date-time
      required:
      - sessionId
      - status
      - expiresAt
    PlanItem:
      type: object
      properties:
        planId:
          type: string
          format: uuid
        planCode:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        billingCycleMonths:
          type: integer
        priceUsd:
          type: string
          description: decimal string
        maxActiveSessions:
          type: integer
        regionAccessPolicy:
          type: string
          enum:
          - BASIC_ONLY
          - INCLUDE_ADVANCED
          - CUSTOM
        includesAdvancedRegions:
          type: boolean
        allowedRegionIds:
          type: array
          items:
            type: string
            format: uuid
        displayOrder:
          type: integer
        status:
          type: string
          enum:
          - DRAFT
          - ACTIVE
          - DISABLED
          nullable: true
      required:
      - planId
      - planCode
      - name
      - billingCycleMonths
      - priceUsd
      - maxActiveSessions
      - regionAccessPolicy
      - includesAdvancedRegions
      - allowedRegionIds
      - displayOrder
    RegionItem:
      type: object
      properties:
        regionId:
          type: string
          format: uuid
        regionCode:
          type: string
        displayName:
          type: string
        tier:
          type: string
          enum:
          - BASIC
          - ADVANCED
        status:
          type: string
          enum:
          - ACTIVE
          - MAINTENANCE
          - DISABLED
        isAllowed:
          type: boolean
        remark:
          type: string
          nullable: true
      required:
      - regionId
      - regionCode
      - displayName
      - tier
      - status
      - isAllowed
    IssueVpnConfigData:
      type: object
      properties:
        regionCode:
          type: string
        connectionMode:
          type: string
          enum:
          - global
          - rule
        configPayload:
          type: string
        issuedAt:
          type: string
          format: date-time
        expireAt:
          type: string
          format: date-time
      required:
      - regionCode
      - connectionMode
      - configPayload
      - issuedAt
      - expireAt
    VpnStatusData:
      type: object
      properties:
        subscriptionStatus:
          type: string
          enum:
          - PENDING_ACTIVATION
          - ACTIVE
          - EXPIRED
          - SUSPENDED
          - CANCELED
          - NONE
        currentRegionCode:
          type: string
          nullable: true
        connectionMode:
          type: string
          enum:
          - global
          - rule
          nullable: true
        canIssueConfig:
          type: boolean
        sessionStatus:
          type: string
          enum:
          - ACTIVE
          - EVICTED
          - REVOKED
          - EXPIRED
      required:
      - subscriptionStatus
      - canIssueConfig
      - sessionStatus
    OrderData:
      type: object
      properties:
        orderId:
          type: string
          format: uuid
        orderNo:
          type: string
        planCode:
          type: string
        planName:
          type: string
        orderType:
          type: string
          enum:
          - NEW
          - RENEWAL
        quoteAssetCode:
          type: string
          enum:
          - SOL
          - USDT
        quoteNetworkCode:
          type: string
          enum:
          - SOLANA
          - TRON
        quoteUsdAmount:
          type: string
          description: decimal string
        payableAmount:
          type: string
          description: decimal string
        status:
          type: string
          enum:
          - AWAITING_PAYMENT
          - PAYMENT_DETECTED
          - CONFIRMING
          - PAID
          - PROVISIONING
          - COMPLETED
          - EXPIRED
          - UNDERPAID_REVIEW
          - OVERPAID_REVIEW
          - FAILED
          - CANCELED
        expiresAt:
          type: string
          format: date-time
        confirmedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        failureReason:
          type: string
          nullable: true
        submittedClientTxHash:
          type: string
          nullable: true
      required:
      - orderId
      - orderNo
      - planCode
      - planName
      - orderType
      - quoteAssetCode
      - quoteNetworkCode
      - quoteUsdAmount
      - payableAmount
      - status
      - expiresAt
    PaymentTargetData:
      type: object
      properties:
        orderNo:
          type: string
        networkCode:
          type: string
          enum:
          - SOLANA
          - TRON
        assetCode:
          type: string
          enum:
          - SOL
          - USDT
        collectionAddress:
          type: string
        payableAmount:
          type: string
          description: decimal string
        uniqueAmountDelta:
          type: string
          description: decimal string
        qrText:
          type: string
        expiresAt:
          type: string
          format: date-time
      required:
      - orderNo
      - networkCode
      - assetCode
      - collectionAddress
      - payableAmount
      - uniqueAmountDelta
      - qrText
      - expiresAt
    ChainInfo:
      type: object
      properties:
        networkCode:
          type: string
          enum:
          - SOLANA
          - TRON
        displayName:
          type: string
        nativeAssetCode:
          type: string
          enum:
          - SOL
          - TRX
        directBroadcastEnabled:
          type: boolean
        proxyBroadcastEnabled:
          type: boolean
        requiredConfirmations:
          type: integer
        publicRpcUrl:
          type: string
          nullable: true
      required:
      - networkCode
      - displayName
      - nativeAssetCode
      - directBroadcastEnabled
      - proxyBroadcastEnabled
      - requiredConfirmations
    AssetCatalogItem:
      type: object
      properties:
        assetId:
          type: string
          format: uuid
        networkCode:
          type: string
          enum:
          - SOLANA
          - TRON
        assetCode:
          type: string
          enum:
          - SOL
          - TRX
          - USDT
        displayName:
          type: string
        symbol:
          type: string
        decimals:
          type: integer
        isNative:
          type: boolean
        contractAddress:
          type: string
          nullable: true
        walletVisible:
          type: boolean
        orderPayable:
          type: boolean
      required:
      - assetId
      - networkCode
      - assetCode
      - displayName
      - symbol
      - decimals
      - isNative
      - walletVisible
      - orderPayable
    WalletPublicAddressItem:
      type: object
      properties:
        addressId:
          type: string
          format: uuid
        networkCode:
          type: string
          enum:
          - SOLANA
          - TRON
        assetCode:
          type: string
          enum:
          - SOL
          - TRX
          - USDT
        address:
          type: string
        isDefault:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
      - addressId
      - networkCode
      - assetCode
      - address
      - isDefault
      - createdAt
    TransferPrecheckData:
      type: object
      properties:
        networkCode:
          type: string
          enum:
          - SOLANA
          - TRON
        assetCode:
          type: string
          enum:
          - SOL
          - TRX
          - USDT
        toAddressNormalized:
          type: string
        amount:
          type: string
          description: decimal string
        estimatedFee:
          type: string
          description: decimal string
        directBroadcastEnabled:
          type: boolean
        proxyBroadcastEnabled:
          type: boolean
        warnings:
          type: array
          items:
            type: string
      required:
      - networkCode
      - assetCode
      - toAddressNormalized
      - amount
      - estimatedFee
      - directBroadcastEnabled
      - proxyBroadcastEnabled
      - warnings
    ProxyBroadcastData:
      type: object
      properties:
        networkCode:
          type: string
          enum:
          - SOLANA
          - TRON
        broadcasted:
          type: boolean
        txHash:
          type: string
          nullable: true
        acceptedAt:
          type: string
          format: date-time
          nullable: true
      required:
      - networkCode
      - broadcasted
    ReferralOverviewData:
      type: object
      properties:
        accountId:
          type: string
          format: uuid
        referralCode:
          type: string
        hasBinding:
          type: boolean
        level1InviteCount:
          type: integer
        level2InviteCount:
          type: integer
        level1IncomeUsdt:
          type: string
          description: decimal string
        level2IncomeUsdt:
          type: string
          description: decimal string
        availableAmountUsdt:
          type: string
          description: decimal string
        frozenAmountUsdt:
          type: string
          description: decimal string
        minWithdrawAmountUsdt:
          type: string
          description: decimal string
      required:
      - accountId
      - referralCode
      - hasBinding
      - level1InviteCount
      - level2InviteCount
      - level1IncomeUsdt
      - level2IncomeUsdt
      - availableAmountUsdt
      - frozenAmountUsdt
      - minWithdrawAmountUsdt
    CommissionSummaryData:
      type: object
